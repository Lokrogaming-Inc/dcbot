<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Server List - Gaming View</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #080513;
        --bg2: #100a24;
        --card: #151033;
        --border: #5b48ff55;
        --accent: #9b8cff;
        --accent2: #22d3ee;
        --text: #ecebff;
        --muted: #a8a6c7;
        --good: #4ade80;
        --warn: #facc15;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 20% 0%, #3b2aa8 0%, transparent 42%),
          radial-gradient(circle at 85% 20%, #0ea5e9 0%, transparent 40%),
          radial-gradient(circle at 60% 100%, #7c3aed 0%, transparent 45%),
          linear-gradient(140deg, var(--bg), var(--bg2));
        padding: 20px;
      }

      .wrap {
        max-width: 1100px;
        margin: 0 auto;
      }

      .header {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: center;
        margin-bottom: 16px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0.03em;
      }

      .subtitle {
        margin-top: 5px;
        color: var(--muted);
        font-size: 13px;
      }

      .back-link {
        color: var(--text);
        text-decoration: none;
        border: 1px solid var(--border);
        background: #0a0920cc;
        border-radius: 10px;
        padding: 8px 12px;
        font-size: 13px;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 14px;
      }

      .stat {
        border: 1px solid var(--border);
        background: linear-gradient(145deg, #140f2e, #09071a);
        border-radius: 12px;
        padding: 10px;
      }

      .stat-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      .stat-value {
        margin-top: 5px;
        font-size: 22px;
        font-weight: 700;
      }

      .list {
        display: grid;
        gap: 10px;
      }

      .card {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        background: linear-gradient(160deg, #130f31cc, #0a081dcc);
      }

      .name-row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: baseline;
      }

      .name {
        font-size: 16px;
        font-weight: 700;
      }

      .id {
        font-size: 11px;
        color: var(--muted);
      }

      .meta {
        margin-top: 8px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .pill {
        border: 1px solid #7c3aed88;
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 11px;
        background: #0a081ecc;
      }

      .ok {
        color: var(--good);
      }

      .off {
        color: var(--warn);
      }

      .empty, .error {
        margin-top: 10px;
        color: var(--muted);
      }

      @media (max-width: 700px) {
        .stats {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div>
          <h1>Server List - Gaming Theme</h1>
          <div class="subtitle">Live indexed guild data from your bot</div>
        </div>
        <a class="back-link" href="/">Back to dashboard</a>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label">Indexed Servers</div>
          <div class="stat-value" id="stat-servers">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Total Members</div>
          <div class="stat-value" id="stat-members">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Members Online</div>
          <div class="stat-value" id="stat-online">0</div>
        </div>
      </div>

      <div class="list" id="server-list"></div>
      <div class="empty" id="empty"></div>
      <div class="error" id="error"></div>
    </div>

    <script>
      const listEl = document.getElementById("server-list");
      const emptyEl = document.getElementById("empty");
      const errorEl = document.getElementById("error");
      const statServers = document.getElementById("stat-servers");
      const statMembers = document.getElementById("stat-members");
      const statOnline = document.getElementById("stat-online");

      function boolText(value) {
        return value ? "on" : "off";
      }

      function num(value) {
        return Number(value || 0).toLocaleString();
      }

      async function loadServerList() {
        errorEl.textContent = "";
        emptyEl.textContent = "";
        try {
          const res = await fetch("/api/servers");
          const payload = await res.json();
          if (!res.ok) {
            throw new Error(payload.error || "Failed to load server list.");
          }

          const servers = payload.servers || [];
          statServers.textContent = num(servers.length);
          statMembers.textContent = num(
            servers.reduce((sum, s) => sum + Number(s.memberCount || 0), 0)
          );
          statOnline.textContent = num(
            servers.reduce((sum, s) => sum + Number(s.onlineCount || 0), 0)
          );

          listEl.innerHTML = "";
          if (!servers.length) {
            emptyEl.textContent = "No server data indexed yet.";
            return;
          }

          servers.forEach((server) => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
              <div class="name-row">
                <div class="name">${server.name || "Unknown server"}</div>
                <div class="id">${server.id || "-"}</div>
              </div>
              <div class="meta">
                <span class="pill">Members: ${num(server.memberCount)}</span>
                <span class="pill">Online: ${num(server.onlineCount)}</span>
                <span class="pill ${server.newsletter ? "ok" : "off"}">Newsletter: ${boolText(server.newsletter)}</span>
                <span class="pill ${server.globalban ? "ok" : "off"}">Globalban: ${boolText(server.globalban)}</span>
                <span class="pill">Invite: ${server.invite ? "available" : "none"}</span>
              </div>
            `;
            listEl.appendChild(card);
          });
        } catch (err) {
          errorEl.textContent = err.message;
        }
      }

      loadServerList();
      setInterval(loadServerList, 120000);
    </script>
  </body>
</html>
